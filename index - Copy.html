<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>HGL information</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#fff;overflow-x:hidden}
.container{display:flex;height:100vh;overflow:hidden}
.left{width:30%;min-width:200px;max-width:35%;border-right:1px solid #eee;padding:16px;overflow-y:auto}
.right{flex:1;padding:20px;overflow:auto;min-width:0}

input,textarea,select{width:100%;padding:8px;margin-bottom:8px}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-content:start;width:100%}
.card{border:1px solid #eee;border-radius:8px;padding:8px;text-align:center;cursor:pointer;display:flex;flex-direction:column;aspect-ratio:0.85;min-width:0}
.card img{width:100%;aspect-ratio:1;border-radius:6px;object-fit:cover;min-height:0}
.card div{font-size:12px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@media (max-width:600px){
.grid{grid-template-columns:repeat(2,1fr);max-width:100%}
.left{width:40%;min-width:200px}
}

.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
.img-wrap{position:relative;padding-top:100%;overflow:hidden;border-radius:10px;background:#eee}
.img-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:0.25s}
.img-wrap:hover img{transform:scale(1.05)}

#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:999}
#lightbox img{max-width:90%;max-height:90%}
#lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);font-size:48px;color:#fff;cursor:pointer;padding:20px;user-select:none;opacity:0.7;transition:0.2s}
#lightbox .nav:hover{opacity:1}
#lightbox .prev{left:10px}
#lightbox .next{right:10px}

#modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center}
.modal-box{background:#fff;padding:20px;border-radius:10px;width:300px}
</style>

</head>

<body>

<div class="container">

<div class="left">
  <a href="https://hglab.hcmus.edu.vn" target="_blank"><h2>HGL information</h2></a>

<button id="loginBtn">Login</button> <button id="logoutBtn" style="display:none">Logout</button>

  <input id="search" placeholder="Search name / id / code">

  <div>
    <button onclick="loadTab('Bsc')">Bsc</button>
    <button onclick="loadTab('Msc')">Msc</button>
    <button onclick="loadTab('PhD')">PhD</button>
    <button onclick="loadTab('Key')">Key</button>
  </div>

  <div id="list" class="grid"></div>

  <div id="adminPanel" style="display:none">
    <button onclick="openAdd()">Add</button>
    <button onclick="backup()">Backup</button>
  </div>
</div>

<div class="right"><div id="detail">Ready</div></div>
</div>

<div id="lightbox">
  <img id="lightbox-img">
  <div class="nav prev" onclick="navigateLightbox(-1)">&#10094;</div>
  <div class="nav next" onclick="navigateLightbox(1)">&#10095;</div>
</div>

<div id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">Add</h3>
    <input id="f_id" placeholder="ID">
    <input id="f_name" placeholder="Name">
    <input id="f_code" placeholder="Code">
    <select id="f_type">
      <option>Bsc</option><option>Msc</option><option>PhD</option><option>Key</option>
    </select>
    <textarea id="f_desc" placeholder="Description"></textarea>
    <input type="file" id="f_avatar">
    <button onclick="saveMember()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const sb = window.supabase.createClient(
  "https://emokkqtmxtthawdtqolb.supabase.co",
  "sb_publishable_ZZPb9Xdx7vrVhVm26ENjaQ_1GYX4zvn"
)

const ADMIN=["huuluannt@gmail.com","liamnicolas9x@gmail.com","hhluan@hcmus.edu.vn","ntnga@hcmus.edu.vn"]

let user=null,isAdmin=false,currentMember=null,currentImages=[],currentIndex=0

async function init(){
  const {data}=await sb.auth.getUser()
  user=data.user
  isAdmin = !!(user && ADMIN.includes(user.email))

  if(user){
    loginBtn.style.display="none"
    logoutBtn.style.display="inline-block"
  }
  if(isAdmin){
    adminPanel.style.display="block"
  }
  loadTab('Bsc')
}
loginBtn.onclick=()=>sb.auth.signInWithOAuth({provider:'google'})
logoutBtn.onclick=()=>{sb.auth.signOut();location.reload()}

function linkify(t){return t.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>')}

function removeAccents(str){
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()
}

async function loadTab(type){
  const {data}=await sb.from('members').select('*').eq('type',type)
  list.innerHTML=''
  data.forEach(m=>{
    let d=document.createElement('div')
    d.className='card'
    d.innerHTML=`<img src="${m.avatar_url||''}"><div>${m.name}</div>`
    d.onclick=()=>showDetail(m)
    list.appendChild(d)
  })
}

async function searchFunc(k){
  k=k.toLowerCase().trim()
  let kNoAcc = removeAccents(k)

  let {data:idData}=await sb.from('members').select('*').eq('id',k)
  if(idData && idData.length===1){showDetail(idData[0]);return}

  let {data:codeData}=await sb.from('members').select('*').eq('code',k)
  if(codeData && codeData.length>0){showList(codeData);return}

  let {data}=await sb.from('members').select('*')
  if(data){
    data=data.filter(m=>{
      let nameNoAcc = removeAccents(m.name||'')
      return nameNoAcc.includes(kNoAcc) || (m.search_text&&removeAccents(m.search_text).includes(kNoAcc))
    })
  }
  if(!data||data.length===0){detail.innerText="Không có kết quả"}
  else if(data.length===1) showDetail(data[0])
  else showList(data)
}

function showList(data){
  detail.innerHTML='<div class="grid" id="searchResult"></div>'
  const searchResult = document.getElementById('searchResult')
  data.forEach(m=>{
    let d=document.createElement('div')
    d.className='card'
    d.innerHTML=`<img src="${m.avatar_url||''}"><div>${m.name}</div>`
    d.onclick=()=>showDetail(m)
    searchResult.appendChild(d)
  })
}

async function showDetail(m){
  currentMember=m
  detail.innerHTML=`
    <h2>${m.name}</h2>
    <p><b>ID:</b> ${m.id}</p>
    <img src="${m.avatar_url||''}" width="200">
    <p><b>Code:</b> ${m.code}</p>
    <p>${linkify(m.description||'')}</p>
    <div id="adminActions"></div>
    <div class="gallery" id="gallery"></div>
  `
  const adminActionsEl=document.getElementById('adminActions')
  const galleryEl=document.getElementById('gallery')

  if(isAdmin){
    adminActionsEl.innerHTML=`
      <button onclick="openEdit()">Edit</button>
      <button onclick="deleteMember()">Delete</button>
      <input type="file" id="upload" multiple>
    `
    document.getElementById('upload').onchange=uploadImages
  }

  let {data,error}=await sb.from('member_images').select('*').eq('member_id',m.id)
  if(error) console.error('Lỗi load ảnh gallery:', error)
  currentImages=data||[]
  console.log('member_images count:', currentImages.length, currentImages)

  galleryEl.innerHTML=''
  if(currentImages.length===0){
    galleryEl.innerHTML='<p style="color:#999;grid-column:1/-1">Chưa có ảnh nào</p>'
    return
  }
  currentImages.forEach((img,i)=>{
    console.log('Ảnh '+i+':', img.image_url)
    let w=document.createElement('div')
    w.className='img-wrap'
    let imgEl=document.createElement('img')
    imgEl.src=img.image_url
    imgEl.onerror=()=>{ imgEl.style.outline='2px solid red'; console.warn('Không load được:', img.image_url) }
    w.appendChild(imgEl)
    w.onclick=()=>openLightbox(i)
    galleryEl.appendChild(w)
  })
}

function openLightbox(i){
  currentIndex=i
  document.getElementById('lightbox').style.display="flex"
  document.getElementById('lightbox-img').src=currentImages[i].image_url
}

function navigateLightbox(direction){
  if(!currentImages.length) return
  currentIndex = (currentIndex + direction + currentImages.length) % currentImages.length
  document.getElementById('lightbox-img').src = currentImages[currentIndex].image_url
}

document.getElementById('lightbox').onclick = (e) => {
  if(e.target.id === 'lightbox') document.getElementById('lightbox').style.display = 'none'
}

document.addEventListener('keydown', (e) => {
  const lb = document.getElementById('lightbox')
  if(lb.style.display === 'flex'){
    if(e.key === 'ArrowLeft') navigateLightbox(-1)
    if(e.key === 'ArrowRight') navigateLightbox(1)
    if(e.key === 'Escape') lb.style.display = 'none'
  }
})

function openAdd(){modal.style.display="flex";modalTitle.innerText="Add"}

function openEdit(){
  modal.style.display="flex"
  modalTitle.innerText="Edit"
  f_id.value=currentMember.id
  f_name.value=currentMember.name
  f_code.value=currentMember.code
  f_type.value=currentMember.type
  f_desc.value=currentMember.description
}

function closeModal(){modal.style.display="none"}

async function saveMember(){
  let id=f_id.value,name=f_name.value,code=f_code.value,type=f_type.value,desc=f_desc.value
  let avatar=""

  if(f_avatar.files[0]){
    let file=f_avatar.files[0]
    let path=`${Date.now()}_${file.name}`
    await sb.storage.from('avatars').upload(path,file)
    avatar=sb.storage.from('avatars').getPublicUrl(path).data.publicUrl
  }

  if(modalTitle.innerText==="Add"){
    await sb.from('members').insert({id,name,code,type,description:desc,avatar_url:avatar,search_text:name})
  }else{
    await sb.from('members').update({name,code,type,description:desc,avatar_url:avatar,search_text:name}).eq('id',id)
  }

  closeModal()
  loadTab(type)
}

async function deleteMember(){
  if(confirm("Delete?")){
    await sb.from('members').delete().eq('id',currentMember.id)
    detail.innerHTML="Deleted"
  }
}

async function uploadImages(e){
  for(let f of e.target.files){
    let path=`${Date.now()}_${f.name}`
    await sb.storage.from('avatars').upload(path,f)
    let url=sb.storage.from('avatars').getPublicUrl(path).data.publicUrl
    await sb.from('member_images').insert({member_id:currentMember.id,image_url:url})
  }
  showDetail(currentMember)
}

async function backup(){
  let {data}=await sb.from('members').select('*')
  let blob=new Blob([JSON.stringify(data)],{type:'application/json'})
  let a=document.createElement('a')
  a.href=URL.createObjectURL(blob)
  a.download='backup.json'
  a.click()
}

search.onkeydown=e=>{if(e.key==="Enter") searchFunc(e.target.value)}

init()

</script>



</body>
</html>
